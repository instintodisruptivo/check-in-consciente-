<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<title>Check-In Consciente · Instinto Disruptivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  color-scheme: light only;
  --red:#C8402E;
  --red-dark:#A83323;
  --ink:#17161A;
  --ink-soft:#4A484E;
  --mist:#9B98A0;
  --paper:#FBFAF9;
  --card:#FFFFFF;
  --line:#ECE9E6;
  --wash:#F3F1EF;
  --shadow: 0 1px 2px rgba(23,22,26,0.04), 0 8px 24px -8px rgba(23,22,26,0.10);
  --radius: 26px;
  --radius-sm: 16px;
  --ease: cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{color-scheme:light only; background:#FBFAF9;}
html,body{height:100%;}
body{
  margin:0; background:#FBFAF9 !important; background-color:#FBFAF9 !important; color:var(--ink);
  font-family:'Manrope',sans-serif; -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}
button{font-family:inherit;}
.mono{font-family:'IBM Plex Mono',monospace;}
.display{font-family:'Fraunces',serif;}

#app{min-height:100vh; display:flex; flex-direction:column; background:#FBFAF9;}

/* ---------- shared layout ---------- */
.screen{
  flex:1; display:flex; flex-direction:column;
  max-width:520px; width:100%; margin:0 auto;
  padding:28px 22px 22px;
  background:#FBFAF9;
  animation: rise .5s var(--ease);
}
@keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

.topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; min-height:32px;}
.backbtn{
  border:none; background:none; color:var(--ink-soft); font-size:15px; font-weight:600;
  display:flex; align-items:center; gap:4px; padding:6px 4px; cursor:pointer;
}
.dots{display:flex; gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--line); transition:background .3s;}
.dot.active{background:var(--red); width:18px; border-radius:4px;}
.dot.done{background:var(--ink-soft);}

.eyebrow{font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--mist); font-weight:700; margin-bottom:6px;}
h1.q{font-family:'Fraunces',serif; font-weight:500; font-size:28px; line-height:1.22; margin:0 0 6px;}
.sub{color:var(--ink-soft); font-size:15px; line-height:1.5; margin:0 0 22px;}

.grow{flex:1;}
.footer-actions{margin-top:auto; padding-top:18px; display:flex; flex-direction:column; gap:10px;}

.btn{
  border:none; border-radius:100px; padding:17px 22px; font-size:16px; font-weight:700;
  cursor:pointer; transition:transform .15s var(--ease), opacity .2s, background .2s;
  display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--ink); color:#fff;}
.btn-primary:disabled{opacity:.35; cursor:not-allowed;}
.btn-red{background:var(--red); color:#fff;}
.btn-ghost{background:transparent; color:var(--ink-soft); font-weight:600;}
.btn-outline{background:var(--card); color:var(--ink); border:1.5px solid var(--line);}

/* option chips / cards */
.opt-list{display:flex; flex-direction:column; gap:10px;}
.opt{
  border:1.5px solid var(--line); background:var(--card); border-radius:18px;
  padding:16px 18px; font-size:15.5px; font-weight:600; color:var(--ink);
  display:flex; align-items:center; gap:12px; cursor:pointer; transition:.18s var(--ease);
}
.opt:active{transform:scale(.985);}
.opt .box{width:20px;height:20px;border-radius:7px;border:2px solid var(--line); flex:none; transition:.18s;}
.opt.selected{border-color:var(--red); background:#FBF0EE;}
.opt.selected .box{background:var(--red); border-color:var(--red);}
.opt .emoji{font-size:22px;}

.grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.opt.center{justify-content:center; text-align:center; flex-direction:column;}

/* slider */
.slider-wrap{padding:26px 4px 6px;}
.slider-value{
  font-family:'Fraunces',serif; font-size:76px; text-align:center; line-height:1;
  color:var(--ink); margin-bottom:6px; font-variant-numeric:tabular-nums;
}
.slider-label{text-align:center; color:var(--mist); font-size:13px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; margin-bottom:26px;}
input[type=range]{
  -webkit-appearance:none; width:100%; height:8px; border-radius:100px; background:var(--wash); outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none; width:30px; height:30px; border-radius:50%; background:var(--red);
  border:5px solid #fff; box-shadow:0 2px 8px rgba(200,64,46,.4); cursor:pointer; margin-top:-11px;
}
input[type=range]::-webkit-slider-runnable-track{height:8px; border-radius:100px;}
.scale-ends{display:flex; justify-content:space-between; color:var(--mist); font-size:12px; margin-top:8px; font-weight:600;}

/* breathing signature element */
.breathe-wrap{display:flex; align-items:center; justify-content:center; padding:38px 0;}
.breathe{position:relative; width:150px; height:150px;}
.breathe .ring{position:absolute; inset:0; border-radius:50%; border:1.5px solid var(--red); opacity:.35; animation:breathe 4.8s ease-in-out infinite;}
.breathe .ring:nth-child(2){animation-delay:.5s;}
.breathe .ring:nth-child(3){animation-delay:1s;}
.breathe .core{position:absolute; inset:38px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #E0654F, var(--red-dark)); box-shadow:0 10px 30px -6px rgba(168,51,35,.55);}
@keyframes breathe{
  0%,100%{transform:scale(.72); opacity:.15;}
  50%{transform:scale(1); opacity:.55;}
}

/* login card */
.login-card{background:var(--card); border-radius:var(--radius); padding:30px 26px; box-shadow:var(--shadow); margin-top:auto; margin-bottom:auto;}
.code-input{
  width:100%; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:26px; letter-spacing:.12em;
  border:1.5px solid var(--line); border-radius:16px; padding:16px; margin:18px 0; background:var(--wash); font-weight:600;
  text-transform:uppercase;
}
.code-input:focus{outline:none; border-color:var(--red); background:#fff;}
.role-pick{display:flex; flex-direction:column; gap:14px; margin-top:auto; margin-bottom:auto;}
.role-card{
  background:var(--card); border-radius:var(--radius); padding:26px; box-shadow:var(--shadow);
  display:flex; align-items:center; gap:16px; cursor:pointer; border:1.5px solid transparent; transition:.2s;
}
.role-card:active{transform:scale(.98);}
.role-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex:none;}
.role-title{font-weight:800; font-size:17px;}
.role-desc{color:var(--ink-soft); font-size:13.5px; margin-top:2px;}

.center-logo{text-align:center; margin:0 auto 6px;}
.logo-mark{width:84px;height:84px; border-radius:24px; overflow:hidden; display:flex; align-items:center; justify-content:center; margin:0 auto 18px; box-shadow:var(--shadow); background:#fff;}
.logo-mark img{width:100%; height:100%; object-fit:cover;}

/* result screen */
.result-tag{
  display:inline-flex; align-items:center; gap:8px; background:var(--wash); border-radius:100px; padding:8px 16px;
  font-size:12.5px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.06em; margin-bottom:16px;
}
.result-headline{font-family:'Fraunces',serif; font-style:italic; font-weight:500; font-size:30px; line-height:1.28; margin:0 0 26px;}
.metric-row{display:flex; gap:10px; margin-bottom:26px;}
.metric{flex:1; background:var(--card); border:1.5px solid var(--line); border-radius:18px; padding:14px 12px; text-align:center;}
.metric .num{font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:600;}
.metric .lbl{font-size:11px; color:var(--mist); text-transform:uppercase; letter-spacing:.06em; font-weight:700; margin-top:2px;}
.strategy-card{background:var(--card); border:1.5px solid var(--line); border-radius:18px; padding:18px 18px; display:flex; gap:14px; margin-bottom:10px; align-items:flex-start;}
.strategy-num{font-family:'IBM Plex Mono',monospace; color:var(--red); font-weight:700; font-size:14px; flex:none; padding-top:1px;}
.strategy-text{font-size:15px; line-height:1.5; font-weight:500;}

/* dashboard */
.dash{min-height:100vh; display:flex; flex-direction:column; background:#FBFAF9;}
.dash-header{
  display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--line);
  background:#fff; position:sticky; top:0; z-index:5;
}
.dash-title{font-weight:800; font-size:16px;}
.dash-body{flex:1; max-width:1100px; width:100%; margin:0 auto; padding:22px; display:grid; gap:18px; background:#FBFAF9;}
@media(min-width:860px){ .dash-body.with-detail{grid-template-columns:290px 1fr;} }
.panel{background:#fff; border:1px solid var(--line); border-radius:20px; padding:20px;}
.panel h3{margin:0 0 14px; font-size:14px; text-transform:uppercase; letter-spacing:.06em; color:var(--mist); font-weight:800;}
.patient-row{
  display:flex; align-items:center; justify-content:space-between; padding:13px 12px; border-radius:14px; cursor:pointer; transition:.15s;
}
.patient-row:hover{background:var(--wash);}
.patient-row.active{background:#FBF0EE;}
.patient-name{font-weight:700; font-size:14.5px;}
.patient-code{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--mist);}
.stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:12px; margin-bottom:18px;}
.stat-box{background:var(--wash); border-radius:16px; padding:14px;}
.stat-box .num{font-family:'IBM Plex Mono',monospace; font-size:21px; font-weight:700;}
.stat-box .lbl{font-size:11px; color:var(--ink-soft); font-weight:700; margin-top:3px;}
.summary-box{background:var(--ink); color:#fff; border-radius:18px; padding:20px; font-size:14.5px; line-height:1.65; margin-bottom:18px;}
.summary-box b{color:#F0A79A;}
table.records{width:100%; border-collapse:collapse; font-size:13px;}
table.records th{text-align:left; color:var(--mist); font-weight:700; text-transform:uppercase; font-size:10.5px; letter-spacing:.05em; padding:8px 8px; border-bottom:1px solid var(--line);}
table.records td{padding:9px 8px; border-bottom:1px solid var(--line); vertical-align:top;}
.field{margin-bottom:14px;}
.field label{display:block; font-size:12px; font-weight:700; color:var(--ink-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em;}
.field input, .field textarea{
  width:100%; border:1.5px solid var(--line); border-radius:12px; padding:12px; font-family:inherit; font-size:14.5px; background:var(--wash);
}
.field textarea{min-height:150px; font-family:'IBM Plex Mono',monospace; font-size:12.5px;}
.pill-btn{border:none; background:var(--wash); border-radius:100px; padding:9px 16px; font-size:13px; font-weight:700; cursor:pointer; color:var(--ink);}
.pill-btn.red{background:var(--red); color:#fff;}
.chart-wrap{position:relative; height:220px; margin-bottom:8px;}
.empty{color:var(--mist); font-size:14px; text-align:center; padding:30px 10px;}
.tag-row{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;}
.tag{background:var(--wash); border-radius:100px; padding:6px 12px; font-size:12px; font-weight:700; color:var(--ink-soft);}
.toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:12px 20px; border-radius:100px; font-size:13.5px; font-weight:600; z-index:50; box-shadow:var(--shadow); animation:rise .3s var(--ease);}
.error-text{color:var(--red); font-size:13.5px; font-weight:600; margin-top:-8px; margin-bottom:14px;}
@media print{
  .no-print{display:none !important;}
  body{background:#fff;}
}
</style>
</head>

function runAlgorithm(a, cfg){
  const physicalCount = a.physical.filter(p=>p!=="Ninguna").length;
  const isIntense = cfg.intenseEmotions.includes(a.emotion);
  const isCalm = cfg.calmEmotions.includes(a.emotion);

  if(a.urgency >= cfg.urgencyHighThreshold && a.hunger <= cfg.hungerLowThreshold){
    return "alta_urgencia";
  }
  if(a.hunger >= cfg.physiologicalMinHunger && physicalCount >= cfg.physiologicalMinPhysicalSignals && !isIntense){
    return "fisiologico";
  }
  if(a.hunger >= cfg.physiologicalMinHunger && physicalCount >= 1 && isIntense){
    return "fisiologico_emocional";
  }
  if(a.hunger <= cfg.emotionalMaxHunger && isIntense && a.urgency >= cfg.emotionalMinUrgency){
    return "emocional";
  }
  return "mixto";
}

/* ---------------- FIREBASE ----------------
   Conectado al proyecto real "check-in-consciente". Cada paciente y el
   nutriólogo comparten los mismos datos a través de Firestore, sin
   importar desde qué teléfono o computadora entren. Se usa autenticación
   anónima (ya activada en el proyecto) solo para que las reglas de
   seguridad de Firestore puedan exigir "usuario autenticado" sin pedirle
   login a nadie más que al nutriólogo (que tiene su propia pantalla). */
const firebaseConfig = {
  apiKey: "AIzaSyCoFYVhNsMxrjGFG1sj4iRyOMpjjc0-1y4",
  authDomain: "check-in-consciente.firebaseapp.com",
  projectId: "check-in-consciente",
  storageBucket: "check-in-consciente.firebasestorage.app",
  messagingSenderId: "598297163633",
  appId: "1:598297163633:web:a553caf11cf634aa3de8d0"
};
let fsDb = null;
let firebaseInitError = null;
try{
  if(typeof firebase === 'undefined') throw new Error('El SDK de Firebase no cargó (revisa tu conexión, un bloqueador de contenido, o firewall de red).');
  firebase.initializeApp(firebaseConfig);
  fsDb = firebase.firestore();
  /* Fuerza "long polling" en vez de streaming en tiempo real: en varias
     redes móviles y wifis con proxy, el modo de streaming de Firestore se
     queda colgado varios segundos antes de fallar. Long polling es un poco
     menos "instantáneo" pero muchísimo más confiable en esas redes. */
  fsDb.settings({ experimentalForceLongPolling: true, merge: true });
}catch(e){
  firebaseInitError = e;
  console.error('No se pudo inicializar Firebase, la app seguirá funcionando solo en este dispositivo:', e);
}

/* Espera a que exista una sesión (anónima) antes de leer/escribir, para
   que las reglas de seguridad "request.auth != null" no rechacen la
   primera llamada justo al cargar la página. Si Firebase no está
   disponible, resuelve de inmediato para no bloquear nada. */
const authReady = fsDb ? new Promise((resolve)=>{
  let settled = false;
  try{
    firebase.auth().onAuthStateChanged(user=>{
      if(user && !settled){ settled = true; resolve(user); }
    });
    firebase.auth().signInAnonymously().catch(e=>{
      console.error('No se pudo iniciar sesión anónima en Firebase:', e);
      if(!settled){ settled = true; resolve(null); }
    });
  }catch(e){
    console.error('Error configurando autenticación:', e);
    if(!settled){ settled = true; resolve(null); }
  }
  setTimeout(()=>{ if(!settled){ settled = true; resolve(null); } }, 8000);
}) : Promise.resolve(null);

function wait(ms){ return new Promise(r=>setTimeout(r, ms)); }

async function storageGet(key){
  if(!fsDb){
    const raw = localStorage.getItem('id_'+key);
    return raw===null ? null : raw;
  }
  let lastError = null;
  for(let attempt=0; attempt<3; attempt++){
    try{
      await authReady;
      const snap = await fsDb.collection('kv').doc(key).get();
      if(snap.exists){
        const value = snap.data().value;
        localStorage.setItem('id_'+key, value);
        return value;
      }
      return null; // Confirmado: la llave no existe (no es un error de conexión)
    }catch(e){
      lastError = e;
      console.warn(`Firestore get intento ${attempt+1}/3 falló para`, key, e);
      if(attempt < 2) await wait(700 * (attempt+1));
    }
  }
  // Se agotaron los reintentos: usamos caché local si existe, y si no,
  // avisamos que fue un problema de conexión (no que "no existe").
  const raw = localStorage.getItem('id_'+key);
  if(raw !== null) return raw;
  throw new Error('No se pudo conectar con la base de datos para leer "'+key+'": ' + (lastError && lastError.message));
}

async function storageSet(key, value){
  if(!fsDb){
    localStorage.setItem('id_'+key, value);
    return;
  }
  let lastError = null;
  for(let attempt=0; attempt<3; attempt++){
    try{
      await authReady;
      await fsDb.collection('kv').doc(key).set({
        value,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      localStorage.setItem('id_'+key, value);
      return;
    }catch(e){
      lastError = e;
      console.warn(`Firestore set intento ${attempt+1}/3 falló para`, key, e);
      if(attempt < 2) await wait(700 * (attempt+1));
    }
  }
  localStorage.setItem('id_'+key, value);
  throw new Error('No se pudo guardar en la base de datos compartida "'+key+'" (se guardó solo en este dispositivo): ' + (lastError && lastError.message));
}

const DB = {
  async getConfig(){
    try{ const v = await storageGet('algorithm-config'); return v? JSON.parse(v) : DEFAULT_ALGORITHM_CONFIG; }
    catch(e){ return DEFAULT_ALGORITHM_CONFIG; }
  },
  async setConfig(cfg){ return storageSet('algorithm-config', JSON.stringify(cfg)); },

  async getAuth(){
    try{ const v = await storageGet('nutri-auth'); return v? JSON.parse(v) : null; }
    catch(e){ return null; }
  },
  async setAuth(auth){ return storageSet('nutri-auth', JSON.stringify(auth)); },
  async ensureAuth(){
    let auth = await this.getAuth();
    if(!auth){
      auth = {username:"nutriologo", password:"instinto2026"};
      try{ await this.setAuth(auth); }catch(e){ /* seguimos con las credenciales por defecto en memoria */ }
    }
    return auth;
  },

  async getPatients(){
    try{ const v = await storageGet('patients'); return v? JSON.parse(v) : []; }
    catch(e){ return []; }
  },
  async setPatients(list){ return storageSet('patients', JSON.stringify(list)); },
  async addPatient(name){
    const list = await this.getPatients();
    const n = list.length + 1;
    const code = "JT" + String(n).padStart(4,"0");
    const patient = {code, name: name || ("Paciente " + code), createdAt: new Date().toISOString()};
    list.push(patient);
    await this.setPatients(list);
    return patient;
  },
  async findPatient(code){
    // A propósito NO usamos getPatients() aquí: esa función devuelve [] en
    // silencio si falla la conexión, lo cual haría creer al paciente que
    // su código "no existe" cuando en realidad fue un problema de red.
    const v = await storageGet('patients');
    const list = v ? JSON.parse(v) : [];
    return list.find(p=>p.code.toUpperCase() === code.toUpperCase()) || null;
  },

  async getRecords(code){
    try{ const v = await storageGet('records:'+code); return v? JSON.parse(v) : []; }
    catch(e){ return []; }
  },
  async addRecord(code, record){
    const list = await this.getRecords(code);
    list.push(record);
    return storageSet('records:'+code, JSON.stringify(list));
  },

  async getNotes(code){
    try{ const v = await storageGet('notes:'+code); return v || ""; }
    catch(e){ return ""; }
  },
  async setNotes(code, text){ return storageSet('notes:'+code, text); }
};

      <div class="eyebrow">Panel del nutriólogo</div>
      <h1 class="q">Iniciar sesión</h1>
      <div class="field"><label>Usuario</label><input id="nutri-user" placeholder="usuario"></div>
      <div class="field"><label>Contraseña</label><input id="nutri-pass" type="password" placeholder="contraseña"></div>
      <div id="nutri-error"></div>
      <button class="btn btn-primary" onclick="submitNutriLogin(event)">Entrar</button>
    </div>
  </div>`;
}
async function submitNutriLogin(ev){
  const btn = ev ? ev.currentTarget : null;
  const err = document.getElementById('nutri-error');
  err.innerHTML = '';
  try{
    if(btn){ btn.disabled = true; btn.textContent = 'Entrando…'; }
    const u = document.getElementById('nutri-user').value.trim();
    const p = document.getElementById('nutri-pass').value;
    const auth = await DB.ensureAuth();
    if(u===auth.username && p===auth.password){
      S.nutri.authed = true; S.nutri.view='list'; S.nutri.selectedCode=null;
      go('nutri-dash');
      return;
    } else {
      err.innerHTML = `<div class="error-text">Usuario o contraseña incorrectos.</div>`;
    }
  }catch(e){
    console.error(e);
    err.innerHTML = `<div class="error-text">No se pudo verificar el acceso. Intenta de nuevo. (${e.message||e})</div>`;
  }finally{
    if(btn){ btn.disabled = false; btn.textContent = 'Entrar'; }
  }
}

/* ---------------- DASHBOARD NUTRIÓLOGO ---------------- */

  } else if(S.nutri.selectedCode){
    detail = await renderPatientDetail(S.nutri.selectedCode, patients);
  } else {
    detail = `<div class="panel"><div class="empty">Selecciona un paciente para ver su historial, o crea uno nuevo.</div></div>`;
  }

  const html = `
  <div class="dash">
    <div class="dash-header no-print">
      <div style="display:flex; align-items:center; gap:10px;">
        <img src="${LOGO_DATA_URI}" alt="Instinto Disruptivo" style="width:34px;height:34px;border-radius:10px; object-fit:cover;">
        <div class="dash-title">Instinto Disruptivo · Panel clínico</div>
      </div>
      <button class="pill-btn" onclick="S.nutri.authed=false; go('role')">Cerrar sesión</button>
    </div>
    <div class="dash-body with-detail">

        <div id="patient-list">

async function createPatient(){
  try{
    const nameInput = document.getElementById('new-patient-name');
    const name = nameInput.value.trim();
    const p = await DB.addPatient(name);
    showToast(`Código generado: ${p.code}`);

    render();
  }catch(e){
    console.error(e);
    showToast('No se pudo crear el paciente. Intenta de nuevo.');
  }
}
function selectPatient(code){ S.nutri.selectedCode = code; S.nutri.view='detail'; render(); }

async function renderPatientDetail(code, patients){
  const patient = patients.find(p=>p.code===code);
  const records = (await DB.getRecords(code)).sort((a,b)=> new Date(b.date)-new Date(a.date));
  const notes = await DB.getNotes(code);

  if(records.length===0){
    return `<div class="panel">
      <h3>${patient.name} · ${patient.code}</h3>
      <div class="empty">Este paciente todavía no tiene registros de check-in.</div>
      <div class="field" style="margin-top:16px;"><label>Notas privadas</label>
        <textarea id="notes-area" style="font-family:inherit; min-height:100px;">${notes}</textarea>
      </div>
      <button class="pill-btn" onclick="saveNotes('${code}')">Guardar notas</button>
    </div>`;
  }

  const n = records.length;
  const avgHunger = (records.reduce((a,r)=>a+r.answers.hunger,0)/n).toFixed(1);
  const avgUrgency = (records.reduce((a,r)=>a+r.answers.urgency,0)/n).toFixed(1);
  const avgSeconds = Math.round(records.reduce((a,r)=>a+r.elapsedSec,0)/n);

  const hourCounts = {};
  records.forEach(r=>{ const h = new Date(r.date).getHours(); hourCounts[h]=(hourCounts[h]||0)+1; });
  const peakHour = Object.entries(hourCounts).sort((a,b)=>b[1]-a[1])[0];
  const peakHourLabel = peakHour ? `${peakHour[0]}:00 - ${(parseInt(peakHour[0])+1)%24}:00` : "—";

  const emoCounts = {}; records.forEach(r=>{ if(r.answers.emotion) emoCounts[r.answers.emotion]=(emoCounts[r.answers.emotion]||0)+1; });
  const topEmotion = Object.entries(emoCounts).sort((a,b)=>b[1]-a[1])[0];

  const resCounts = {}; records.forEach(r=>{ resCounts[r.result]=(resCounts[r.result]||0)+1; });
  const topResult = Object.entries(resCounts).sort((a,b)=>b[1]-a[1])[0];

  const stratCounts = {}; records.forEach(r=>r.strategies.forEach(s=>{ stratCounts[s]=(stratCounts[s]||0)+1; }));
  const topStrats = Object.entries(stratCounts).sort((a,b)=>b[1]-a[1]).slice(0,2).map(x=>x[0]);

  const summary = `Durante los registros disponibles (${n} en total), el paciente completó check-ins mayormente entre <b>${peakHourLabel}</b>. `
    + (topEmotion? `Predominó la emoción <b>${topEmotion[0]}</b>. ` : '')
    + `El promedio de hambre física fue <b>${avgHunger}/10</b> y la urgencia promedio fue <b>${avgUrgency}/10</b>. `
    + `El resultado más frecuente fue "${RESULTS[topResult[0]].label}". `
    + (topStrats.length? `Las estrategias más presentadas fueron: ${topStrats.join(' y ')}.` : '');

  setTimeout(()=>renderCharts(records), 30);

  return `
  <div class="panel">
    <div class="no-print" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
      <h3 style="margin:0;">${patient.name} · ${patient.code}</h3>
      <div style="display:flex; gap:8px;">
        <button class="pill-btn" onclick="exportCSV('${code}')">Exportar CSV/Excel</button>
        <button class="pill-btn" onclick="exportPDF('${code}')">Exportar PDF</button>
      </div>
    </div>

    <div class="summary-box">${summary}</div>

    <div class="stat-grid">
      <div class="stat-box"><div class="num">${n}</div><div class="lbl">Registros totales</div></div>
      <div class="stat-box"><div class="num">${avgSeconds}s</div><div class="lbl">Tiempo promedio</div></div>
      <div class="stat-box"><div class="num">${avgHunger}</div><div class="lbl">Hambre prom.</div></div>
      <div class="stat-box"><div class="num">${avgUrgency}</div><div class="lbl">Urgencia prom.</div></div>
    </div>

    <div class="chart-wrap"><canvas id="chart-trend"></canvas></div>
    <div class="chart-wrap"><canvas id="chart-results"></canvas></div>

    <h3 style="margin-top:20px;">Historial</h3>
    <div style="overflow-x:auto;">
    <table class="records">
      <thead><tr><th>Fecha</th><th>Resultado</th><th>Hambre</th><th>Urgencia</th><th>Emoción</th><th>Dispositivo</th></tr></thead>
      <tbody>
        ${records.map(r=>`<tr>
          <td>${new Date(r.date).toLocaleString('es-MX',{dateStyle:'short',timeStyle:'short'})}</td>
          <td>${RESULTS[r.result].tone}</td>
          <td>${r.answers.hunger}</td>
          <td>${r.answers.urgency}</td>
          <td>${r.answers.emotion||'—'}</td>
          <td>${r.device}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    </div>

    <div class="field no-print" style="margin-top:20px;"><label>Notas privadas del nutriólogo</label>
      <textarea id="notes-area" style="font-family:inherit; min-height:100px;">${notes}</textarea>
    </div>
    <button class="pill-btn no-print" onclick="saveNotes('${code}')">Guardar notas</button>
  </div>`;
}

let _trendChart=null, _resultChart=null;
function renderCharts(records){
  const sorted = [...records].sort((a,b)=> new Date(a.date)-new Date(b.date));
  const labels = sorted.map(r=> new Date(r.date).toLocaleDateString('es-MX',{month:'short',day:'numeric'}));
  const hungerData = sorted.map(r=>r.answers.hunger);
  const urgencyData = sorted.map(r=>r.answers.urgency);

  const trendCtx = document.getElementById('chart-trend');
  if(trendCtx){
    if(_trendChart) _trendChart.destroy();
    _trendChart = new Chart(trendCtx, {
      type:'line',
      data:{ labels, datasets:[
        {label:'Hambre', data:hungerData, borderColor:'#17161A', backgroundColor:'transparent', tension:.35},
        {label:'Urgencia', data:urgencyData, borderColor:'#C8402E', backgroundColor:'transparent', tension:.35}
      ]},
      options:{ responsive:true, maintainAspectRatio:false, scales:{ y:{ min:0, max:10 } },
        plugins:{ title:{display:true, text:'Hambre vs. urgencia en el tiempo'} } }
    });
  }
  const resultCtx = document.getElementById('chart-results');
  if(resultCtx){
    const counts = {}; records.forEach(r=>{ counts[r.result]=(counts[r.result]||0)+1; });
    const keys = Object.keys(counts);
    if(_resultChart) _resultChart.destroy();
    _resultChart = new Chart(resultCtx, {
      type:'bar',
      data:{ labels: keys.map(k=>RESULTS[k].tone), datasets:[{ label:'Frecuencia', data:keys.map(k=>counts[k]), backgroundColor:'#C8402E' }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ title:{display:true, text:'Distribución de resultados'} }, scales:{ y:{ beginAtZero:true, ticks:{stepSize:1} } } }
    });
  }
}

async function saveNotes(code){
  try{
    const val = document.getElementById('notes-area').value;
    await DB.setNotes(code, val);
    showToast('Notas guardadas');
  }catch(e){
    console.error(e);
    showToast('No se pudieron guardar las notas.');
  }
}

async function exportPDF(code){
  const printWin = window.open('', '_blank');
  if(!printWin){ showToast('Tu navegador bloqueó la ventana. Habilita ventanas emergentes e intenta de nuevo.'); return; }
  printWin.document.write('<p style="font-family:sans-serif;padding:24px;">Generando reporte…</p>');
  try{
    const patients = await DB.getPatients();
    const patient = patients.find(p=>p.code===code) || {name:code, code};
    const records = (await DB.getRecords(code)).sort((a,b)=> new Date(a.date)-new Date(b.date));
    const notes = await DB.getNotes(code);

    const rowsHtml = records.map(r=>`<tr>
      <td>${new Date(r.date).toLocaleString('es-MX',{dateStyle:'short',timeStyle:'short'})}</td>
      <td>${RESULTS[r.result] ? RESULTS[r.result].tone : r.result}</td>
      <td>${r.answers.hunger}</td>
      <td>${r.answers.urgency}</td>
      <td>${r.answers.emotion||'—'}</td>
      <td>${r.device||''}</td>
    </tr>`).join('');

    const n = records.length;
    const avgHunger = n? (records.reduce((a,r)=>a+r.answers.hunger,0)/n).toFixed(1) : '—';
    const avgUrgency = n? (records.reduce((a,r)=>a+r.answers.urgency,0)/n).toFixed(1) : '—';

    const html = `<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
    <title>Reporte ${patient.name}</title>
    <style>
      body{font-family:-apple-system,Arial,sans-serif; color:#17161A; padding:28px; max-width:800px; margin:0 auto;}
      h1{font-size:20px; margin-bottom:2px;} .sub{color:#666; font-size:13px; margin-bottom:20px;}
      .stats{display:flex; gap:14px; margin-bottom:20px;}
      .stat{background:#F3F1EF; border-radius:10px; padding:10px 14px; font-size:13px;}
      .stat b{display:block; font-size:18px;}
      table{width:100%; border-collapse:collapse; font-size:12px;}
      th,td{border:1px solid #ddd; padding:6px 8px; text-align:left;}
      th{background:#F3F1EF;}
      .notes{background:#F3F1EF; padding:14px; border-radius:10px; margin-top:20px; font-size:13px; white-space:pre-wrap;}
      @media print{ body{padding:10px;} }
    </style></head>
    <body>
      <h1>${patient.name} · ${patient.code}</h1>
      <div class="sub">Reporte generado el ${new Date().toLocaleString('es-MX')} · Instinto Disruptivo</div>
      <div class="stats">
        <div class="stat"><b>${n}</b>Registros</div>
        <div class="stat"><b>${avgHunger}</b>Hambre prom.</div>
        <div class="stat"><b>${avgUrgency}</b>Urgencia prom.</div>
      </div>
      <table>
        <thead><tr><th>Fecha</th><th>Resultado</th><th>Hambre</th><th>Urgencia</th><th>Emoción</th><th>Dispositivo</th></tr></thead>
        <tbody>${rowsHtml || '<tr><td colspan="6">Sin registros aún.</td></tr>'}</tbody>
      </table>
      ${notes? `<div class="notes"><b>Notas del nutriólogo:</b>\n${notes.replace(/</g,'&lt;')}</div>` : ''}
    </body></html>`;

    printWin.document.open();
    printWin.document.write(html);
    printWin.document.close();
    setTimeout(()=>{ try{ printWin.focus(); printWin.print(); }catch(e){} }, 350);
  }catch(e){
    console.error(e);
    printWin.document.body.innerHTML = '<p style="font-family:sans-serif;padding:24px;">No se pudo generar el reporte. Cierra esta ventana e intenta de nuevo.</p>';
  }
}
async function exportCSV(code){
  const records = await DB.getRecords(code);
  const rows = records.map(r=>[
    new Date(r.date).toLocaleString('es-MX'),
    r.resultLabel,
    r.answers.hunger,
    r.answers.urgency,
    r.answers.emotion||'',
    r.answers.timeSince||'',
    (r.answers.physical||[]).join(' | '),
    (r.answers.needs||[]).join(' | '),
    r.elapsedSec,
    r.device
  ]);
  const csv = [header, ...rows].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `registros_${code}.csv`; a.click();
  URL.revokeObjectURL(url);
}

async function renderConfigPanel(){
  const cfg = await DB.getConfig();
  const auth = await DB.ensureAuth();
  return `
  <div class="panel">
    <h3>Configuración del algoritmo clínico</h3>
    <p class="sub" style="margin-bottom:14px;">Ajusta los umbrales del árbol de decisiones sin modificar el código de la aplicación. Formato JSON.</p>
    <div class="field"><textarea id="config-json" style="min-height:260px;">${JSON.stringify(cfg, null, 2)}</textarea></div>
    <div id="config-error"></div>
    <button class="pill-btn red" onclick="saveConfig()">Guardar reglas</button>

    <h3 style="margin-top:28px;">Credenciales de acceso</h3>
    <div class="field"><label>Usuario</label><input id="new-username" value="${auth.username}"></div>
    <div class="field"><label>Contraseña</label><input id="new-password" value="${auth.password}"></div>
    <button class="pill-btn" onclick="saveAuth()">Actualizar credenciales</button>
  </div>`;
}
async function saveConfig(){
  const err = document.getElementById('config-error');
  err.innerHTML = '';
  let val;
  try{
    val = JSON.parse(document.getElementById('config-json').value);
  }catch(e){ err.innerHTML = `<div class="error-text">JSON inválido, revisa el formato.</div>`; return; }
  try{
    await DB.setConfig(val);
    showToast('Reglas actualizadas');
  }catch(e){
    console.error(e);
    err.innerHTML = `<div class="error-text">No se pudieron guardar las reglas. Intenta de nuevo.</div>`;
  }
}
async function saveAuth(){
  const u = document.getElementById('new-username').value.trim();
  const p = document.getElementById('new-password').value;
  if(!u||!p) return;
  try{
    await DB.setAuth({username:u, password:p});
    showToast('Credenciales actualizadas');
  }catch(e){
    console.error(e);
    showToast('No se pudieron actualizar las credenciales.');
  }
}
